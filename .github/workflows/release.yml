name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: node esbuild.js --production

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package.json version $pkg"
            exit 1
          fi
          echo "Releasing version $pkg"

      - name: Package VSIX
        run: npx vsce package --out "md-comments-${GITHUB_REF_NAME#v}.vsix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: md-comments-*.vsix
          generate_release_notes: true
          body: |
            Install via **Extensions → ⋯ → Install from VSIX…** and pick the `.vsix` attached below.

            Or from the command line:
            ```
            code --install-extension md-comments-${{ github.ref_name }}.vsix
            ```
